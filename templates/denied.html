<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso denegado — Temple Bar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a202c;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: #1a202c; }
    p { color: #718096; font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    .email { font-weight: 600; color: #e53e3e; }
    .btn {
      display: inline-block;
      background: #2E5FA3;
      color: #fff;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #1e4a8a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Acceso denegado</h1>
    <p>
      La cuenta <span class="email">{{ email }}</span> no está autorizada para acceder al dashboard de Temple Bar.
      <br><br>
      Si creés que esto es un error, contactá al administrador del sistema.
    </p>
    <a href="{{ url_for('login') }}?prompt=select_account" class="btn">
      Iniciar sesión con otra cuenta
    </a>
  </div>
</body>
</html>
