<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview · Reporte de Producto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto}

/* Header */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.hdr-title{font-size:20px;font-weight:800;color:#e6edf3;letter-spacing:-.3px}
.hdr-sub{font-size:12px;color:#6e7681;margin-top:3px}
.badge-preview{font-size:10px;font-weight:700;background:#1a2a1a;color:#6ee7b7;border:1px solid rgba(110,231,183,.3);border-radius:6px;padding:4px 10px;letter-spacing:.4px}

/* KPI row */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi-card{flex:1;min-width:180px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.kpi-label{font-size:10px;font-weight:700;color:#8b949e;letter-spacing:.4px;text-transform:uppercase}
.kpi-val{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1;color:#e6edf3}
.kpi-sub{font-size:11px;color:#8b949e}
.kpi-sub.pos{color:#6ee7b7}
.kpi-sub.neg{color:#f87171}

/* Grid principal */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:860px){.main-grid{grid-template-columns:1fr}}

/* Cards */
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8b949e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title span{color:#e6edf3}

/* Mix breakdown */
.mix-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mix-lbl{width:140px;font-size:12px;font-weight:600;color:#e6edf3;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.mix-track{flex:1;background:#21262d;border-radius:4px;height:20px;overflow:hidden}
.mix-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#0d1117;white-space:nowrap;transition:width .4s ease}
.mix-pct{width:40px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;color:#e6edf3}
.mix-fac{width:80px;font-size:11px;color:#8b949e;text-align:right;flex-shrink:0}

/* Ranking tabla */
.rank-table{width:100%;border-collapse:collapse;font-size:12px}
.rank-table th{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8b949e;padding:7px 10px;border-bottom:1px solid #30363d;white-space:nowrap}
.rank-table th:first-child,.rank-table th:nth-child(2),.rank-table th:nth-child(3){text-align:left}
.rank-table th:nth-child(4),.rank-table th:nth-child(5),.rank-table th:nth-child(6),.rank-table th:nth-child(7){text-align:right}
.rank-table td{padding:8px 10px;border-bottom:1px solid #1c2128;vertical-align:middle}
.rank-table td:first-child{color:#6e7681;font-weight:700;font-size:11px;text-align:left;width:28px}
.rank-table td:nth-child(2){font-weight:600;color:#e6edf3;text-align:left}
.rank-table td:nth-child(3){text-align:left}
.rank-table td:nth-child(4),.rank-table td:nth-child(5){text-align:right;color:#8b949e}
.rank-table tbody tr:hover{background:#1c2128}
.mix-chip{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;opacity:.85}
.pct-bar-wrap{display:flex;align-items:center;gap:6px}
.pct-bar{height:4px;border-radius:2px;min-width:4px}

/* Full width card */
.card-full{grid-column:1/-1}

/* Sub-KPI litros */
.lts-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.lts-card{flex:1;min-width:140px;background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.lts-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lts-body{display:flex;flex-direction:column;gap:2px}
.lts-label{font-size:9px;font-weight:700;color:#8b949e;letter-spacing:.4px;text-transform:uppercase}
.lts-val{font-size:16px;font-weight:800;line-height:1}
.lts-zero{color:#484f58;font-size:13px;font-weight:600}

.delta-up{color:#3fb950;font-weight:700}
.delta-dn{color:#f87171;font-weight:700}
.delta-new{color:#3fb950;font-size:10px;font-weight:700}
/* Locales litros */
.lts-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lts-btn{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.lts-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.lts-btn:not(.active):hover{color:#e6edf3;border-color:#8b949e}
.local-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.local-rank{width:20px;font-size:11px;font-weight:700;color:#6e7681;text-align:right;flex-shrink:0}
.local-name{width:200px;font-size:12px;font-weight:600;color:#e6edf3;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.local-track{flex:1;background:#21262d;border-radius:4px;height:18px;overflow:hidden}
.local-fill{height:100%;border-radius:4px;background:#1f6feb;transition:width .3s ease}
.local-val{width:70px;font-size:12px;font-weight:700;color:#8b949e;text-align:right;flex-shrink:0}
.marca-chip{font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle;opacity:.85;flex-shrink:0}
/* Donut */
.mix-donut-wrap{display:flex;align-items:center;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.donut-container{position:relative;flex-shrink:0;width:140px;height:140px}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-center-lbl{font-size:9px;color:#8b949e;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.donut-center-val{font-size:18px;font-weight:900;color:#e6edf3;line-height:1.1}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px;min-width:140px}
.donut-leg-row{display:flex;align-items:center;gap:8px}
.donut-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-leg-name{font-size:11px;font-weight:600;color:#e6edf3;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.donut-leg-pct{font-size:11px;font-weight:700;color:#8b949e;flex-shrink:0}
.donut-leg-fac{font-size:10px;color:#6e7681;flex-shrink:0;min-width:52px;text-align:right}
</style>
</head>
<body>
<div class="wrap">

<div style="font-size:11px;color:#6e7681;margin-bottom:16px">Período: <span id="periodoLabel">—</span></div>

<div id="sinAccesoWarn" style="display:none;background:#1c1206;border:1px solid rgba(251,146,60,.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#fb923c;font-size:13px">&#9888; Sin datos disponibles para esta marca en el período seleccionado.</div>

<div class="kpi-row" id="kpiRow"></div>
<div class="lts-row" id="ltsRow"></div>

<div class="main-grid">
  <div class="card">
    <div class="card-title">&#129379; <span>Mix de Venta · Facturación</span></div>
    <div class="mix-donut-wrap">
      <div class="donut-container">
        <svg id="donutSvg" viewBox="0 0 140 140" width="140" height="140" style="transform:rotate(-90deg)"></svg>
        <div class="donut-center">
          <div class="donut-center-lbl">TOTAL</div>
          <div class="donut-center-val" id="donutTotal">—</div>
        </div>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
    <div class="card-title" style="margin-top:4px">&#127771; <span>Desglose por Categoría</span></div>
    <div id="mixPanel"></div>
  </div>
  <div class="card">
    <div class="card-title">&#127942; <span>Top 15 Productos</span></div>
    <div style="overflow-x:auto">
      <table class="rank-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Litros</th>
            <th>Facturación</th>
            <th>vs mes ant.</th>
            <th>% Total</th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Top 10 Locales por Litros -->
<div class="card card-full" style="margin-top:16px">
  <div class="card-title">&#127963; <span>Top 10 Locales · Litros Despachados</span></div>
  <div class="lts-filter" id="localFilter">
    <button class="lts-btn active" onclick="setLtsFilter('lts_total',this)">Total</button>
    <button class="lts-btn" onclick="setLtsFilter('lts_cerveza',this)">&#127866; Cerveza</button>
    <button class="lts-btn" onclick="setLtsFilter('lts_gin',this)">&#127864; Gin</button>
    <button class="lts-btn" onclick="setLtsFilter('lts_feriado',this)">&#127881; Feriado</button>
  </div>
  <div id="localesChart"></div>
</div>


</div>

<script>
const DATASETS = __DATASETS_JSON__;

var _marca   = 'TODAS';
var _periodo = 'mes_actual';
var _ltsKey  = 'lts_total';

function updatePeriodLabel(){
  var ds = DATASETS[_periodo];
  document.getElementById('periodoLabel').textContent = ds ? (ds.label || _periodo) : _periodo;
}
updatePeriodLabel();

function fmtM(n){
  if(!n) return '$0';
  if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)    return '$'+(n/1000).toFixed(0)+'K';
  return '$'+Math.round(n);
}

function fmtLts(n){
  if(!n || n===0) return '—';
  if(n>=1000) return (n/1000).toFixed(1)+'K lts';
  return n.toFixed(1)+' lts';
}

function setMarca(m, btn){
  _marca = m;
  render();
}

window.addEventListener('message', function(e){
  if(!e.data) return;
  if(e.data.type === 'setMarca'){
    setMarca(e.data.marca || 'TODAS', null);
  } else if(e.data.type === 'setPeriodo'){
    var p = e.data.periodo;
    if(DATASETS[p]){ _periodo = p; updatePeriodLabel(); render(); }
  }
});

function setLtsFilter(key, btn){
  _ltsKey = key;
  document.querySelectorAll('#localFilter .lts-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLocales((DATASETS[_periodo]||{})[_marca]);
}

function render(){
  const d = (DATASETS[_periodo]||{})[_marca];
  if(!d) return;

  // Sin acceso BQ
  var warn = document.getElementById('sinAccesoWarn');
  if(warn) warn.style.display = d.sin_acceso ? 'block' : 'none';
  if(d.sin_acceso){
    ['kpiRow','ltsRow','mixPanel','localesChart'].forEach(function(id){
      var el = document.getElementById(id); if(el) el.innerHTML = '';
    });
    document.getElementById('rankBody').innerHTML = '';
    document.getElementById('donutSvg').innerHTML = '';
    document.getElementById('donutLegend').innerHTML = '';
    document.getElementById('donutTotal').textContent = '—';
    return;
  }

  // KPIs
  const vsSign = d.vs_ant_pct !== null ? (d.vs_ant_pct >= 0 ? '+' : '') : null;
  const vsCls  = d.vs_ant_pct !== null ? (d.vs_ant_pct >= 0 ? 'pos' : 'neg') : '';
  document.getElementById('kpiRow').innerHTML =
    kpiCard('Facturación Total', fmtM(d.total_fac),
      vsSign !== null ? `<span class="${vsCls}">${vsSign}${d.vs_ant_pct}% vs per. ant.</span>` : '') +
    kpiCard('Total Litros', fmtLts(d.total_lts), 'volumen despachado en el período') +
    kpiCard('Productos activos', d.n_productos, 'unidades distintas en el período') +
    kpiCard('Top categoría', d.top_mix, d.top_mix_pct + '% de la facturación');

  // Sub-KPIs litros por tipo
  var ltsTypes = [
    {key:'lts_cerveza', label:'Cerveza',     icon:'🍺', color:'#f59e0b'},
    {key:'lts_gin',     label:'Gin · Bosque',icon:'🍸', color:'#818cf8'},
    {key:'lts_fernet',  label:'Fernet',      icon:'🥃', color:'#34d399'},
    {key:'lts_feriado', label:'Feriado',     icon:'🎉', color:'#f472b6'},
  ];
  document.getElementById('ltsRow').innerHTML = ltsTypes.map(function(t){
    var v = d[t.key] || 0;
    var valHtml = v > 0
      ? '<div class="lts-val" style="color:'+t.color+'">'+fmtLts(v)+'</div>'
      : '<div class="lts-zero">—</div>';
    return '<div class="lts-card">'
      +'<div class="lts-icon" style="background:'+t.color+'22">'+t.icon+'</div>'
      +'<div class="lts-body"><div class="lts-label">'+t.label+'</div>'+valHtml+'</div>'
      +'</div>';
  }).join('');

  // Donut
  renderDonut(d.mix, d.total_fac);

  // Mix bars
  const maxFac = d.mix.length ? d.mix[0].fac : 1;
  document.getElementById('mixPanel').innerHTML = d.mix.slice(0,12).map(function(m){
    var w = Math.max(Math.round(m.fac/maxFac*100), 3);
    var ltsStr = m.lts > 0 ? '<span style="color:#6e7681;margin-left:4px">'+fmtLts(m.lts)+'</span>' : '';
    return '<div class="mix-row">'
      +'<div class="mix-lbl" title="'+m.mix+'">'+m.mix+'</div>'
      +'<div class="mix-track"><div class="mix-fill" style="width:'+w+'%;background:'+m.color+'">'+
        (w>15?m.pct+'%':'')+'</div></div>'
      +'<div class="mix-pct">'+(w<=15?m.pct+'%':'')+'</div>'
      +'<div class="mix-fac">'+fmtM(m.fac)+ltsStr+'</div>'
      +'</div>';
  }).join('');


  // Locales
  renderLocales(d);

  // Ranking
  const maxR = d.ranking.length ? d.ranking[0].facturacion : 1;
  document.getElementById('rankBody').innerHTML = d.ranking.slice(0,15).map(function(r,i){
    var barW = Math.max(Math.round(r.facturacion/maxR*60),2);
    var ltsCell = r.litros > 0
      ? '<td style="text-align:right;color:#8b949e">'+fmtLts(r.litros)+'</td>'
      : '<td style="text-align:right;color:#484f58">—</td>';
    var deltaCell;
    if(r.delta_pct === 'nuevo'){
      deltaCell = '<td><span class="delta-new">★ Nuevo</span></td>';
    } else if(r.delta_pct === null || r.delta_pct === undefined){
      deltaCell = '<td style="color:#484f58;text-align:right">—</td>';
    } else {
      var up  = r.delta_pct >= 0;
      var cls = up ? 'delta-up' : 'delta-dn';
      var arr = up ? '▲' : '▼';
      deltaCell = '<td style="text-align:right"><span class="'+cls+'">'+arr+' '+Math.abs(r.delta_pct)+'%</span></td>';
    }
    return '<tr>'
      +'<td>'+(i+1)+'</td>'
      +'<td>'+r.producto+'</td>'
      +'<td><span class="mix-chip" style="background:'+r.color+'22;color:'+r.color+'">'+r.familia+'</span></td>'
      +ltsCell
      +'<td>'+fmtM(r.facturacion)+'</td>'
      +deltaCell
      +'<td><div class="pct-bar-wrap"><div class="pct-bar" style="width:'+barW+'px;background:'+r.color+'"></div><span>'+r.pct_fac+'%</span></div></td>'
      +'</tr>';
  }).join('');
}

function renderDonut(mix, totalFac){
  var svg = document.getElementById('donutSvg');
  var cx = 70, cy = 70, r = 54, stroke = 22;
  var circ = 2 * Math.PI * r;
  var offset = 0;
  var top5 = mix.slice(0, 5);
  var otherFac = mix.slice(5).reduce(function(s,m){ return s + m.fac; }, 0);
  var segments = top5.slice();
  if(otherFac > 0) segments.push({mix:'Otros', fac: otherFac, pct: Math.round(otherFac/totalFac*100*10)/10, color:'#484f58'});

  var html = '';
  segments.forEach(function(m){
    var arc = (m.fac / totalFac) * circ;
    html += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'"'
      +' fill="none" stroke="'+m.color+'" stroke-width="'+stroke+'"'
      +' stroke-dasharray="'+arc.toFixed(2)+' '+circ.toFixed(2)+'"'
      +' stroke-dashoffset="'+(-offset).toFixed(2)+'"'
      +' style="transition:stroke-dasharray .4s ease"/>';
    offset += arc;
  });
  svg.innerHTML = html;

  document.getElementById('donutTotal').textContent = fmtM(totalFac);

  document.getElementById('donutLegend').innerHTML = segments.map(function(m){
    return '<div class="donut-leg-row">'
      +'<div class="donut-leg-dot" style="background:'+m.color+'"></div>'
      +'<div class="donut-leg-name" title="'+m.mix+'">'+m.mix+'</div>'
      +'<div class="donut-leg-pct">'+m.pct+'%</div>'
      +'<div class="donut-leg-fac">'+fmtM(m.fac)+'</div>'
      +'</div>';
  }).join('');
}

var MARCA_COLORS = {Temple:'#f59e0b', Patagonia:'#60a5fa', Feriado:'#f472b6'};

function renderLocales(d){
  var all = (d.locales || []).slice();
  all.sort(function(a,b){ return b[_ltsKey] - a[_ltsKey]; });
  var top = all.slice(0,10).filter(function(l){ return l[_ltsKey] > 0; });
  var el  = document.getElementById('localesChart');
  if(!top.length){
    el.innerHTML = '<div style="color:#484f58;font-size:12px;padding:12px 0">Sin datos de litros para esta selección</div>';
    return;
  }
  var maxLts = top[0][_ltsKey] || 1;
  var barColors = {lts_total:'#1f6feb', lts_cerveza:'#f59e0b', lts_gin:'#818cf8', lts_feriado:'#f472b6'};
  var barColor  = barColors[_ltsKey] || '#1f6feb';
  el.innerHTML = top.map(function(l,i){
    var pct = Math.max(Math.round(l[_ltsKey] / maxLts * 100), 1);
    var mc  = l.marca ? MARCA_COLORS[l.marca] || '#8b949e' : null;
    var chip = mc ? '<span class="marca-chip" style="background:'+mc+'22;color:'+mc+'">'+l.marca+'</span>' : '';
    return '<div class="local-row">'
      +'<div class="local-rank">'+(i+1)+'</div>'
      +'<div class="local-name" title="'+l.local+'">'+l.local+chip+'</div>'
      +'<div class="local-track"><div class="local-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'
      +'<div class="local-val">'+fmtLts(l[_ltsKey])+'</div>'
      +'</div>';
  }).join('');
}

function kpiCard(label, val, sub){
  return '<div class="kpi-card">'
    +'<div class="kpi-label">'+label+'</div>'
    +'<div class="kpi-val">'+val+'</div>'
    +(sub?'<div class="kpi-sub">'+sub+'</div>':'')
    +'</div>';
}

render();
</script>
</body>
</html>
