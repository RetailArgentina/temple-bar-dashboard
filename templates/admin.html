<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de Usuarios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 24px;
    }

    a { color: #c9a227; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .back-link:hover { color: #c9a227; text-decoration: none; }
    .back-link::before { content: "←"; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 20px;
    }

    /* Message */
    #msg {
      display: none;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      border: 1px solid transparent;
    }
    #msg.ok  { background: #052e16; border-color: #166534; color: #4ade80; }
    #msg.err { background: #450a0a; border-color: #7f1d1d; color: #f87171; }

    /* Add button */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #c9a227;
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .btn-add:hover { background: #e0b830; }

    /* Table */
    .table-wrap {
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #161b22;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: #161b22; }

    /* Role badges */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-superadmin { background: rgba(201,162,39,0.18); color: #c9a227; border: 1px solid rgba(201,162,39,0.4); }
    .badge-editor      { background: rgba(56,139,253,0.18); color: #58a6ff; border: 1px solid rgba(56,139,253,0.4); }
    .badge-viewer      { background: rgba(139,148,158,0.18); color: #8b949e; border: 1px solid rgba(139,148,158,0.4); }

    /* Brand tags */
    .brand-tag {
      display: inline-block;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      margin: 2px 2px 2px 0;
    }

    /* Action buttons */
    .btn-edit, .btn-del {
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-right: 6px;
    }
    .btn-edit { background: #21262d; color: #58a6ff; border: 1px solid #30363d; }
    .btn-edit:hover { background: #30363d; }
    .btn-del  { background: #21262d; color: #f87171; border: 1px solid #30363d; }
    .btn-del:hover  { background: #30363d; }

    .no-actions { color: #484f58; font-size: 13px; }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      width: 480px;
      max-width: 95vw;
      padding: 28px;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #e6edf3;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: #c9a227; }
    .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-group select option { background: #161b22; }

    /* Brand checkboxes */
    .brands-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      max-height: 180px;
      overflow-y: auto;
    }

    .brands-grid label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #c6d0db;
      cursor: pointer;
      text-transform: none;
      letter-spacing: normal;
      font-weight: normal;
    }

    .brands-grid input[type="checkbox"] {
      width: auto;
      accent-color: #c9a227;
      cursor: pointer;
    }

    .brands-divider {
      width: 100%;
      border: none;
      border-top: 1px solid #21262d;
      margin: 4px 0;
    }

    /* Modal footer */
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel:hover { border-color: #8b949e; color: #e6edf3; }

    .btn-save {
      background: #c9a227;
      border: none;
      border-radius: 6px;
      color: #0d1117;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #e0b830; }

    /* Empty state */
    .empty-row td {
      text-align: center;
      color: #484f58;
      padding: 32px;
    }
  </style>
</head>
<body>

  <a href="/destileria" class="back-link">Volver al Dashboard</a>

  <h1>Gestion de Usuarios</h1>

  <div id="msg"></div>

  <button class="btn-add" onclick="openModal('create')">+ Agregar usuario</button>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Rol</th>
          <th>Marcas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr class="empty-row"><td colspan="4">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Agregar usuario</h2>

      <div class="form-group">
        <label for="input-email">Email</label>
        <input type="email" id="input-email" placeholder="usuario@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="input-role">Rol</label>
        <select id="input-role">
          <option value="viewer">Viewer</option>
          <option value="editor">Editor</option>
        </select>
      </div>

      <div class="form-group">
        <label>Marcas</label>
        <div class="brands-grid" id="brands-grid">
          <label>
            <input type="checkbox" id="cb-all" value="*" onchange="toggleAll(this)">
            Todas
          </label>
          <hr class="brands-divider">
          {% for b in brands %}
          <label>
            <input type="checkbox" class="cb-brand" value="{{ b }}">
            {{ b }}
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="submitModal()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    var CSRF_TOKEN = '{{ csrf_token() }}';
    var currentMode = 'create';
    var currentEmail = '';

    function badgeHtml(role) {
      var cls = 'badge badge-' + role;
      return '<span class="' + cls + '">' + role + '</span>';
    }

    function brandsHtml(brands) {
      if (!brands || brands.length === 0) return '<span style="color:#484f58">—</span>';
      if (brands.indexOf('*') !== -1) return '<span class="brand-tag">Todas</span>';
      var out = '';
      for (var i = 0; i < brands.length; i++) {
        out += '<span class="brand-tag">' + escHtml(brands[i]) + '</span>';
      }
      return out;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function loadUsers() {
      fetch('/api/admin/users')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var tbody = document.getElementById('users-body');
          var users = data.users || [];
          if (users.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No hay usuarios registrados.</td></tr>';
            return;
          }
          var html = '';
          for (var i = 0; i < users.length; i++) {
            var u = users[i];
            var actions;
            if (u.role === 'superadmin') {
              actions = '<span class="no-actions">—</span>';
            } else {
              var brandsJson = escHtml(JSON.stringify(u.brands || []));
              actions = '<button class="btn-edit" onclick="openModal(\'edit\',\'' + escHtml(u.email) + '\',\'' + escHtml(u.role) + '\',\'' + brandsJson + '\')">Editar</button>'
                      + '<button class="btn-del" onclick="deleteUser(\'' + escHtml(u.email) + '\')">Eliminar</button>';
            }
            html += '<tr>'
              + '<td>' + escHtml(u.email) + '</td>'
              + '<td>' + badgeHtml(u.role) + '</td>'
              + '<td>' + brandsHtml(u.brands) + '</td>'
              + '<td>' + actions + '</td>'
              + '</tr>';
          }
          tbody.innerHTML = html;
        })
        .catch(function() {
          document.getElementById('users-body').innerHTML = '<tr class="empty-row"><td colspan="4">Error al cargar usuarios.</td></tr>';
        });
    }

    function openModal(mode, email, role, brandsJson) {
      currentMode = mode;
      currentEmail = email || '';

      document.getElementById('modal-title').textContent = mode === 'create' ? 'Agregar usuario' : 'Editar usuario';

      var emailInput = document.getElementById('input-email');
      emailInput.value = currentEmail;
      emailInput.disabled = (mode === 'edit');

      var roleSelect = document.getElementById('input-role');
      roleSelect.value = (role && role !== 'superadmin') ? role : 'viewer';

      // Reset checkboxes
      document.getElementById('cb-all').checked = false;
      var cbs = document.querySelectorAll('.cb-brand');
      for (var i = 0; i < cbs.length; i++) { cbs[i].checked = false; }

      // Apply brands
      if (brandsJson) {
        var brands;
        try { brands = JSON.parse(brandsJson); } catch(e) { brands = []; }
        if (brands.indexOf('*') !== -1) {
          document.getElementById('cb-all').checked = true;
          for (var j = 0; j < cbs.length; j++) { cbs[j].checked = true; }
        } else {
          for (var k = 0; k < cbs.length; k++) {
            if (brands.indexOf(cbs[k].value) !== -1) { cbs[k].checked = true; }
          }
        }
      }

      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    function toggleAll(masterCb) {
      var cbs = document.querySelectorAll('.cb-brand');
      for (var i = 0; i < cbs.length; i++) {
        cbs[i].checked = masterCb.checked;
      }
    }

    function submitModal() {
      var email = document.getElementById('input-email').value.trim();
      var role  = document.getElementById('input-role').value;

      if (!email) { showMsg('El email es obligatorio.', false); return; }

      var allCb = document.getElementById('cb-all');
      var brands;
      if (allCb.checked) {
        brands = ['*'];
      } else {
        brands = [];
        var cbs = document.querySelectorAll('.cb-brand:checked');
        for (var i = 0; i < cbs.length; i++) { brands.push(cbs[i].value); }
      }

      var method = currentMode === 'create' ? 'POST' : 'PUT';
      var url    = '/api/admin/users';

      fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': CSRF_TOKEN
        },
        body: JSON.stringify({ email: email, role: role, brands: brands })
      })
        .then(function(r) {
          if (r.ok) return r.json();
          return r.json().then(function(d) { throw new Error(d.error || 'Error'); });
        })
        .then(function() {
          closeModal();
          showMsg(currentMode === 'create' ? 'Usuario creado.' : 'Usuario actualizado.', true);
          loadUsers();
        })
        .catch(function(err) {
          showMsg(err.message || 'Error inesperado.', false);
        });
    }

    function deleteUser(email) {
      if (!confirm('Eliminar al usuario ' + email + '?')) return;
      fetch('/api/admin/users/' + encodeURIComponent(email), {
        method: 'DELETE',
        headers: { 'X-CSRFToken': CSRF_TOKEN }
      })
        .then(function(r) {
          if (r.ok) return r.json();
          return r.json().then(function(d) { throw new Error(d.error || 'Error'); });
        })
        .then(function() {
          showMsg('Usuario eliminado.', true);
          loadUsers();
        })
        .catch(function(err) {
          showMsg(err.message || 'Error inesperado.', false);
        });
    }

    function showMsg(text, ok) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = ok ? 'ok' : 'err';
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) { closeModal(); }
    });

    loadUsers();
  </script>

</body>
</html>
